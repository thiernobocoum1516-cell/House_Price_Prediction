name: ML Pipeline CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      # -------------------------
      # TEST LOADER
      # -------------------------
      - name: Test loader
        run: |
          python -c "from src.data.loader import load_train_data; df = load_train_data(); print(df.shape)"

      # -------------------------
      # TEST FEATURE ENGINEERING
      # -------------------------
      - name: Test builder
        run: |
          python -c "from src.features.builder import create_all_features; print('builder OK')"

      # -------------------------
      # BUILD DATASET
      # -------------------------
      - name: Build dataset
        run: |
          python scripts/build_dataset.py

      # -------------------------
      # TEST TRAIN MODULE
      # -------------------------
      - name: Test train import
        run: |
          python -c "import src.models.train; print('train import OK')"

      # -------------------------
      # RUN PYTEST
      # -------------------------
      - name: Run tests
        run: |
          pytest -v